<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Client Portal</title>
    <!-- We load Supabase's official browser library for safe user handling -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            background-color: #0a0b0d;
            color: #e2e8f0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .login-box {
            background-color: #14161d;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444; /* Premium red accent line */
            width: 320px;
            text-align: center;
        }
        h2 { 
            color: #ef4444; 
            margin-top: 0;
            margin-bottom: 24px; 
            font-size: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #0a0b0d;
            border: 1px solid #3f4451;
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
            transition: 0.2s;
        }
        input:focus { border-color: #ef4444; outline: none; box-shadow: 0 0 5px rgba(239, 68, 68, 0.5); }
        button {
            width: 100%;
            padding: 12px;
            background-color: #ef4444;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 16px;
            letter-spacing: 0.5px;
        }
        button:hover { background-color: #dc2626; box-shadow: 0 0 12px rgba(239, 68, 68, 0.4); }
        .register-link {
            background-color: transparent; 
            color: #ef4444; 
            border: 1px solid #ef4444; 
            margin-top: 10px;
        }
        .register-link:hover {
            background-color: rgba(239, 68, 68, 0.1);
        }
        .status { margin-top: 20px; font-size: 13px; color: #ff6b6b; font-weight: 500; min-height: 18px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Portal Login</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn" onclick="handleAuth('login')">Log In</button>
        <button id="regBtn" class="register-link" onclick="handleAuth('register')">Create Account</button>
        <div class="status" id="statusBox">Initializing secure connection...</div>
    </div>

    <script>
        // ⚠️ Replace these later with your free credentials from your Supabase dashboard
        const SUPABASE_URL = "YOUR_SUPABASE_PROJECT_URL";
        const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
        
        let supabase = null;

        // Initialize Supabase safely
        try {
            if (SUPABASE_URL !== "YOUR_SUPABASE_PROJECT_URL") {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                document.getElementById('statusBox').style.color = "#10b981";
                document.getElementById('statusBox').innerText = "Security gateway active.";
            } else {
                document.getElementById('statusBox').innerText = "Configuration required.";
            }
        } catch (e) {
            document.getElementById('statusBox').innerText = "Initialization failed.";
        }

        async function handleAuth(type) {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const status = document.getElementById('statusBox');

            if (!supabase) {
                status.style.color = "#ef4444";
                status.innerText = "Please connect your database credentials first.";
                return;
            }

            if (!email || !password) {
                status.style.color = "#ef4444";
                status.innerText = "All fields are required.";
                return;
            }

            status.style.color = "#3b82f6";
            status.innerText = "Authenticating...";

            if (type === 'login') {
                // Securely sign in user
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    status.style.color = "#ef4444";
                    status.innerText = "Login failed: " + error.message;
                } else {
                    status.style.color = "#10b981";
                    status.innerText = "Welcome back! Redirecting...";
                    // You can redirect them to a dashboard page here
                }
            } else if (type === 'register') {
                // Securely sign up new user
                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) {
                    status.style.color = "#ef4444";
                    status.innerText = "Sign up failed: " + error.message;
                } else {
                    status.style.color = "#10b981";
                    status.innerText = "Account created! Check your email for confirmation.";
                }
            }
        }
    </script>
</body>
</html>
